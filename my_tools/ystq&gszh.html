<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>多图层编辑器</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height: 100vh;
            background: #f0f2f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            height: 100vh;
        }

        /* ===== 整体布局：上下结构 ===== */
        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 100vw;
            background: #f8faff;
        }

        /* ===== 顶部工具栏 ===== */
        .top-toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f8;
            flex-shrink: 0;
            min-height: 56px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            z-index: 30;
        }
        .top-toolbar::-webkit-scrollbar { display: none; }

        .top-toolbar .logo {
            font-size: 22px;
            margin-right: 8px;
            flex-shrink: 0;
            cursor: default;
            user-select: none;
        }

        .tools-nav {
            display: flex;
            align-items: center;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .tool-btn {
            background: transparent;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 10px;
            color: #6a7b8e;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
            touch-action: manipulation;
            flex-shrink: 0;
            min-width: 44px;
        }
        .tool-btn .icon { font-size: 20px; line-height: 1.2; }
        .tool-btn .label { font-size: 9px; font-weight: 500; line-height: 1.2; white-space: nowrap; }
        .tool-btn:active { transform: scale(0.92); }
        .tool-btn.active {
            background: #eaf1fe;
            color: #1f2a3a;
            font-weight: 600;
        }
        .tool-btn.active .label { color: #1f2a3a; }
        .tool-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background: #2c3e5a;
            border-radius: 4px 4px 0 0;
        }
        .tool-btn { position: relative; }

        /* ===== 右侧颜色信息 ===== */
        .header-color-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .header-color-info .color-swatch {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 1px solid #dee5ef;
            flex-shrink: 0;
            background: #a0aab8;
        }
        .header-color-info .color-hex {
            font-size: 12px;
            font-weight: 500;
            color: #1a2330;
            font-family: "SF Mono", "Menlo", monospace;
            min-width: 40px;
        }

        /* ===== 标题栏（简化版） ===== */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 16px 4px 16px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f8;
            flex-shrink: 0;
            min-height: 36px;
        }
        .main-header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #1f2a3a;
        }

        /* ===== 画布区域 ===== */
        .canvas-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px 12px 4px 12px;
            min-height: 0;
            background: #f8faff;
        }
        .canvas-wrapper {
            position: relative;
            background: #eef0f4;
            border-radius: 16px;
            overflow: hidden;
            touch-action: none;
            flex: 1;
            min-height: 160px;
            border: 1px solid #e6ebf3;
            aspect-ratio: 700 / 480;
            max-height: 100%;
            align-self: center;
            width: 100%;
        }
        #imageCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            background: #eef0f4;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            cursor: default;
        }
        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            object-fit: contain;
        }
        .zoom-indicator {
            position: absolute;
            bottom: 12px;
            left: 14px;
            background: rgba(20,28,40,0.7);
            backdrop-filter: blur(4px);
            color: #f0f4fc;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            font-family: "SF Mono", "Menlo", monospace;
            pointer-events: none;
            user-select: none;
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: 2;
        }
        .zoom-indicator.show { opacity: 1; }

        .hint-msg {
            margin: 4px 4px 0 4px;
            font-size: 12px;
            color: #7a8aa0;
            user-select: none;
            flex-shrink: 0;
            min-height: 20px;
        }

        /* ===== 工具面板 (下方) ===== */
        .tool-panel {
            background: #ffffff;
            border-top: 1px solid #eef2f8;
            padding: 10px 14px 14px 14px;
            flex-shrink: 0;
            max-height: 46vh;
            overflow-y: auto;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.02);
        }
        .panel-content { display: none; animation: fadeUp 0.2s ease; }
        .panel-content.active { display: block; }
        @keyframes fadeUp { 0% { opacity:0; transform:translateY(6px); } 100% { opacity:1; transform:translateY(0); } }

        /* ===== 工具面板内部样式 ===== */
        .adv-group { margin-bottom: 12px; }
        .adv-group:last-child { margin-bottom: 0; }
        .adv-group-title { font-size: 13px; font-weight: 600; color: #2c3e5a; margin-bottom: 4px; letter-spacing: 0.2px; }
        .adv-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .adv-row label { font-size: 12px; color: #4a5a72; min-width: 28px; }
        .adv-row input[type="number"] { width: 54px; padding: 3px 5px; border: 1px solid #d0d7e2; border-radius: 6px; font-size: 12px; background: #fff; font-family: inherit; }
        .adv-row input[type="number"]:focus { outline: none; border-color: #7a8ba3; }
        .adv-row input[type="range"] { flex: 1; min-width: 70px; accent-color: #3d6b9b; }
        .adv-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #2c3e5a;
            cursor: pointer;
        }
        .adv-row .value-label { min-width: 28px; font-size: 12px; color: #3d4a5c; font-weight: 500; }
        .adv-btn { padding: 4px 12px; border: none; border-radius: 30px; background: #e6ecf5; font-size: 12px; font-weight: 500; color: #1f2a3a; cursor: pointer; transition: background 0.15s; font-family: inherit; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .adv-btn:active { background: #cdd6e3; }
        .adv-btn.primary { background: #2c3e5a; color: #fff; }
        .adv-btn.primary:active { background: #1a2a3f; }
        .adv-btn.danger { background: #e8d5d5; color: #7a3a3a; }
        .adv-btn.danger:active { background: #dbbdbd; }
        .adv-btn.small { font-size: 11px; padding: 2px 10px; }

        /* 图层列表 */
        .layer-list { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; max-height: 130px; overflow-y: auto; border: 1px solid #e2e6ee; border-radius: 10px; padding: 4px 6px; background: #fff; }
        .layer-item { display: flex; align-items: center; gap: 6px; padding: 3px 6px; border-radius: 6px; background: #fafcff; border: 1px solid #eef2f8; transition: background 0.15s, border-color 0.15s; user-select: none; min-height: 32px; }
        .layer-item.selected { border-color: #2c3e5a; background: #eaf1fe; }
        .layer-item .thumb { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: #eef0f4; border: 1px solid #d0d7e2; flex-shrink: 0; }
        .layer-item .layer-name { flex: 1; font-size: 12px; font-weight: 500; color: #1f2a3a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .layer-item .layer-actions { display: flex; gap: 0px; align-items: center; flex-shrink: 0; }
        .layer-item .layer-actions button { background: none; border: none; font-size: 13px; cursor: pointer; padding: 2px 3px; border-radius: 4px; transition: background 0.1s; line-height: 1; color: #2c3e5a; touch-action: manipulation; -webkit-tap-highlight-color: transparent; min-width: 22px; min-height: 22px; display: flex; align-items: center; justify-content: center; }
        .layer-item .layer-actions button:active { background: #d0d7e2; }
        .layer-item .layer-actions .vis-toggle { font-size: 13px; }
        .layer-item .layer-actions .del-btn { color: #b33; font-size: 13px; }
        .layer-item .layer-actions .move-btn { font-size: 11px; color: #4a5a72; padding: 2px 2px; }
        .layer-item .layer-actions .move-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .layer-controls { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; align-items: center; }
        .layer-controls .adv-row { margin-bottom: 0; }

        /* 裁剪 */
        .crop-checkboxes { display: flex; flex-wrap: wrap; gap: 3px 8px; flex: 1; }
        .crop-checkboxes label { display: flex; align-items: center; gap: 3px; font-size: 12px; color: #2c3e5a; cursor: pointer; }

        /* 擦除 */
        .erase-tool { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .erase-tool label { font-size: 12px; color: #4a5a72; }
        .erase-tool input[type="range"] { width: 80px; accent-color: #3d6b9b; }
        .erase-tool .size-val { min-width: 24px; font-size: 12px; font-weight: 500; }

        /* 导出 */
        .export-grid { display: flex; gap: 6px; flex-wrap: wrap; }
        .export-grid .adv-btn { flex: 1; min-width: 48px; text-align: center; padding: 6px 0; font-size: 12px; }
        .export-grid .adv-btn[data-format="png"] { background: #e3eaf7; color: #1c3b6b; }
        .export-grid .adv-btn[data-format="jpg"] { background: #f7ede6; color: #6b3d1c; }
        .export-grid .adv-btn[data-format="webp"] { background: #e6f7ed; color: #1c6b3d; }
        .export-grid .adv-btn[data-format="bmp"] { background: #efe6f7; color: #4a1c6b; }
        .export-grid .adv-btn:active { transform: scale(0.94); }

        /* 上传蒙版 */
        .upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(238, 240, 244, 0.85);
            backdrop-filter: blur(6px);
            z-index: 10;
            border-radius: 16px;
            cursor: pointer;
            transition: opacity 0.3s ease;
            gap: 6px;
            padding: 16px;
            text-align: center;
            color: #3d4a5c;
            border: 2px dashed #d0d7e2;
        }
        .upload-overlay.hidden { opacity: 0; pointer-events: none; }
        .upload-overlay .upload-icon { font-size: 40px; }
        .upload-overlay .upload-title { font-size: 15px; font-weight: 500; color: #1f2a3a; }
        .upload-overlay .upload-sub { font-size: 12px; color: #6a7b8e; }
        #fileInput { display: none; }

        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            .top-toolbar {
                padding: 4px 8px;
                min-height: 48px;
                gap: 2px;
            }
            .top-toolbar .logo {
                font-size: 18px;
                margin-right: 4px;
            }
            .tool-btn {
                padding: 4px 6px;
                min-width: 36px;
            }
            .tool-btn .icon { font-size: 17px; }
            .tool-btn .label { font-size: 8px; }
            .tool-btn.active::after { width: 12px; height: 2px; }

            .header-color-info .color-swatch { width: 20px; height: 20px; }
            .header-color-info .color-hex { font-size: 10px; min-width: 34px; }

            .main-header h1 { font-size: 12px; }
            .main-header { padding: 2px 10px; min-height: 28px; }

            .canvas-section { padding: 4px 6px 2px 6px; }
            .canvas-wrapper { border-radius: 10px; min-height: 100px; }

            .tool-panel { padding: 6px 8px 10px 8px; max-height: 42vh; }
            .adv-row { gap: 4px; }
            .adv-row input[type="number"] { width: 46px; padding: 2px 4px; font-size: 11px; }
            .adv-row input[type="range"] { min-width: 50px; }
            .adv-btn { font-size: 11px; padding: 3px 8px; }
            .layer-item { min-height: 28px; padding: 2px 4px; }
            .layer-item .thumb { width: 20px; height: 20px; }
            .layer-item .layer-actions button { font-size: 11px; min-width: 18px; min-height: 18px; }
            .export-grid .adv-btn { font-size: 11px; padding: 4px 0; min-width: 40px; }
            .upload-overlay .upload-icon { font-size: 28px; }
            .upload-overlay .upload-title { font-size: 13px; }
            .upload-overlay .upload-sub { font-size: 11px; }
            .hint-msg { font-size: 11px; min-height: 16px; margin: 2px 2px 0 2px; }
            .zoom-indicator { font-size: 10px; padding: 2px 8px; bottom: 6px; left: 8px; }
        }

        @media (max-width: 400px) {
            .top-toolbar { padding: 2px 4px; min-height: 40px; }
            .tool-btn { padding: 2px 4px; min-width: 30px; }
            .tool-btn .icon { font-size: 14px; }
            .tool-btn .label { font-size: 7px; }
            .header-color-info .color-hex { font-size: 9px; min-width: 28px; }
            .header-color-info .color-swatch { width: 16px; height: 16px; }
            .main-header h1 { font-size: 11px; }
            .adv-row label { font-size: 10px; min-width: 20px; }
            .adv-row input[type="number"] { width: 38px; }
        }
    </style>
</head>
<body>

<div class="app-layout">

    <!-- ===== 顶部工具栏 ===== -->
    <div class="top-toolbar">
        <span class="logo">🎨</span>
        <nav class="tools-nav">
            <button class="tool-btn active" data-tool="upload" title="上传"><span class="icon">📁</span><span class="label">上传</span></button>
            <button class="tool-btn" data-tool="layers" title="图层"><span class="icon">📚</span><span class="label">图层</span></button>
            <button class="tool-btn" data-tool="filters" title="滤镜"><span class="icon">🎨</span><span class="label">滤镜</span></button>
            <button class="tool-btn" data-tool="crop" title="裁剪"><span class="icon">✂️</span><span class="label">裁剪</span></button>
            <button class="tool-btn" data-tool="colorpicker" title="取色"><span class="icon">💉</span><span class="label">取色</span></button>
            <button class="tool-btn" data-tool="erase" title="擦除"><span class="icon">🧹</span><span class="label">擦除</span></button>
            <button class="tool-btn" data-tool="export" title="导出"><span class="icon">💾</span><span class="label">导出</span></button>
        </nav>
        <div class="header-color-info">
            <div class="color-swatch" id="colorSwatch" style="background:#a0aab8;"></div>
            <span class="color-hex" id="hexDisplay">—</span>
        </div>
    </div>

    <!-- ===== 主内容 ===== -->
    <div class="main-content">

        <!-- 标题栏 -->
        <header class="main-header">
            <h1>🖼️ 多图层编辑器</h1>
            <div style="font-size:12px;color:#8a9ab0;" id="layerCount">0 个图层</div>
        </header>

        <!-- 画布区域 -->
        <section class="canvas-section">
            <div class="canvas-wrapper" id="canvasWrapper">
                <div class="upload-overlay" id="uploadOverlay">
                    <span class="upload-icon">📁</span>
                    <span class="upload-title">点击上传图片</span>
                    <span class="upload-sub">JPG / PNG / WebP / BMP</span>
                </div>
                <canvas id="imageCanvas"></canvas>
                <canvas id="overlayCanvas"></canvas>
                <div class="zoom-indicator" id="zoomIndicator">100%</div>
            </div>
            <div class="hint-msg" id="hintMsg">💡 点击顶部工具开始编辑</div>
        </section>

        <!-- 工具面板 -->
        <section class="tool-panel" id="toolPanel">
            <!-- 上传 -->
            <div class="panel-content active" id="panel-upload">
                <div class="adv-group">
                    <div class="adv-group-title">📁 上传图片</div>
                    <div class="adv-row" style="gap:12px;">
                        <button class="adv-btn primary" id="uploadBtn" style="padding:6px 20px;">选择图片</button>
                        <span style="font-size:12px; color:#7a8aa0;">支持多选</span>
                    </div>
                    <div style="font-size:12px; color:#8a9ab0; margin-top:2px;">点击画布也可上传</div>
                </div>
            </div>

            <!-- 图层 -->
            <div class="panel-content" id="panel-layers">
                <div class="adv-group">
                    <div class="adv-group-title">📚 图层管理</div>
                    <div class="layer-list" id="layerList"></div>
                    <div class="layer-controls">
                        <div class="adv-row">
                            <label>X</label>
                            <input type="number" id="layerX" value="0" step="1" style="width:50px;" />
                            <label>Y</label>
                            <input type="number" id="layerY" value="0" step="1" style="width:50px;" />
                            <label>旋转</label>
                            <input type="number" id="layerRotation" value="0" step="1" min="0" max="360" style="width:44px;" />
                            <label>°</label>
                            <button class="adv-btn" id="applyLayerPos">应用</button>
                            <button class="adv-btn danger" id="deleteSelectedLayer">删除</button>
                        </div>
                        <div class="adv-row">
                            <label>大小</label>
                            <input type="range" id="layerScaleSlider" min="10" max="200" value="100" step="1" style="flex:1; min-width:60px;" />
                            <span class="value-label" id="layerScaleVal">100%</span>
                        </div>
                        <div class="adv-row">
                            <label>不透明度</label>
                            <input type="range" id="layerOpacitySlider" min="0" max="100" value="100" step="1" style="flex:1; min-width:60px;" />
                            <span class="value-label" id="layerOpacityVal">100%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 滤镜 -->
            <div class="panel-content" id="panel-filters">
                <div class="adv-group">
                    <div class="adv-group-title">🎨 滤镜</div>
                    <div class="adv-row"><label>亮度</label><input type="range" id="brightnessSlider" min="0" max="200" value="100" /><span class="value-label" id="brightnessVal">100%</span></div>
                    <div class="adv-row"><label>对比度</label><input type="range" id="contrastSlider" min="0" max="200" value="100" /><span class="value-label" id="contrastVal">100%</span></div>
                    <div class="adv-row"><label>饱和度</label><input type="range" id="saturationSlider" min="0" max="200" value="100" /><span class="value-label" id="saturationVal">100%</span></div>
                    <div class="adv-row"><label>色相</label><input type="range" id="hueSlider" min="0" max="360" value="0" /><span class="value-label" id="hueVal">0°</span></div>
                    <div class="adv-row"><button class="adv-btn danger" id="resetLayerFilters">重置滤镜</button></div>
                </div>
            </div>

            <!-- 裁剪 -->
            <div class="panel-content" id="panel-crop">
                <div class="adv-group">
                    <div class="adv-group-title">✂️ 裁剪</div>
                    <div class="adv-row">
                        <label>比例</label>
                        <input type="number" id="cropRatioW" value="16" style="width:44px;" min="1" step="1" />
                        <span style="color:#4a5a72;">:</span>
                        <input type="number" id="cropRatioH" value="9" style="width:44px;" min="1" step="1" />
                        <button class="adv-btn primary" id="cropApplyBtn" style="padding:4px 14px;">裁剪</button>
                    </div>
                    <div class="adv-row" style="gap:4px; flex-wrap:wrap;">
                        <label style="min-width:28px;">预设</label>
                        <button class="adv-btn crop-preset" data-w="1" data-h="1">1:1</button>
                        <button class="adv-btn crop-preset" data-w="4" data-h="3">4:3</button>
                        <button class="adv-btn crop-preset" data-w="16" data-h="9">16:9</button>
                        <button class="adv-btn crop-preset" data-w="3" data-h="2">3:2</button>
                        <button class="adv-btn crop-preset" data-w="21" data-h="9">21:9</button>
                    </div>
                    <div class="adv-row" style="flex-wrap:wrap; gap:4px; margin-top:4px;">
                        <label style="min-width:28px;">图层</label>
                        <div class="crop-checkboxes" id="cropLayerCheckboxes"></div>
                        <button class="adv-btn small" id="cropSelectAll">全选</button>
                        <button class="adv-btn small" id="cropSelectNone">取消</button>
                    </div>
                    <div style="font-size:11px; color:#8a9ab0; margin-top:2px;">⚠️ 裁剪后不可恢复</div>
                </div>
            </div>

            <!-- 取色器 -->
            <div class="panel-content" id="panel-colorpicker">
                <div class="adv-group">
                    <div class="adv-group-title">💉 取色器</div>
                    <div class="adv-row"><button class="adv-btn" id="colorPickToggle" style="min-width:80px;">🎨 取色模式</button><span style="font-size:12px; color:#7a8aa0;">点击画布取色</span></div>

                        <div><span style="font-size:12px; color:#4a5a72;">HSV</span> <span style="font-weight:500; font-family:monospace; font-size:13px;" id="vHsv">—</span></div>
                        <div><span style="font-size:12px; color:#4a5a72;">CMYK</span> <span style="font-weight:500; font-family:monospace; font-size:13px;" id="vCmyk">—</span></div>

            <!-- 擦除 -->

                    <div class="adv-row erase-tool">

            <!-- 导出 -->

                    <div class="export-grid">
                        <button class="adv-btn" data-format="png">PNG</button>
                        <button class="adv-btn" data-format="jpg">JPG</button>

<!-- 隐藏 file input -->
<input type="file" id="fileInput" accept="image/*" multiple />

<script>
    (function() {
        'use strict';

        // ========== DOM 引用 ==========
        const fileInput = document.getElementById('fileInput');
        const uploadOverlay = document.getElementById('uploadOverlay');
        const uploadBtn = document.getElementById('uploadBtn');
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const overlayCtx = overlayCanvas.getContext('2d');
        const zoomIndicator = document.getElementById('zoomIndicator');
        const hintMsg = document.getElementById('hintMsg');
        const layerCountEl = document.getElementById('layerCount');

        const colorSwatch = document.getElementById('colorSwatch');
        const hexDisplay = document.getElementById('hexDisplay');
        const vHex = document.getElementById('vHex');
        const vRgb = document.getElementById('vRgb');
        const vHsl = document.getElementById('vHsl');
        const vHsv = document.getElementById('vHsv');
        const vCmyk = document.getElementById('vCmyk');

        const exportBtns = document.querySelectorAll('.export-grid .adv-btn');

        const layerList = document.getElementById('layerList');
        const layerX = document.getElementById('layerX');
        const layerY = document.getElementById('layerY');
        const layerRotation = document.getElementById('layerRotation');
        const layerScaleSlider = document.getElementById('layerScaleSlider');
        const layerScaleVal = document.getElementById('layerScaleVal');
        const layerOpacitySlider = document.getElementById('layerOpacitySlider');
        const layerOpacityVal = document.getElementById('layerOpacityVal');
        const applyLayerPos = document.getElementById('applyLayerPos');
        const deleteSelectedBtn = document.getElementById('deleteSelectedLayer');

        const brightnessSlider = document.getElementById('brightnessSlider');
        const contrastSlider = document.getElementById('contrastSlider');
        const saturationSlider = document.getElementById('saturationSlider');
        const hueSlider = document.getElementById('hueSlider');
        const brightnessVal = document.getElementById('brightnessVal');
        const contrastVal = document.getElementById('contrastVal');
        const saturationVal = document.getElementById('saturationVal');
        const hueVal = document.getElementById('hueVal');
        const resetLayerFilters = document.getElementById('resetLayerFilters');

        const colorPickToggle = document.getElementById('colorPickToggle');
        const eraseModeToggle = document.getElementById('eraseModeToggle');
        const brushSizeSlider = document.getElementById('brushSizeSlider');
        const brushSizeVal = document.getElementById('brushSizeVal');
        const clearErasure = document.getElementById('clearErasure');

        const cropRatioW = document.getElementById('cropRatioW');
        const cropRatioH = document.getElementById('cropRatioH');
        const cropApplyBtn = document.getElementById('cropApplyBtn');
        const cropLayerCheckboxes = document.getElementById('cropLayerCheckboxes');
        const cropSelectAll = document.getElementById('cropSelectAll');
        const cropSelectNone = document.getElementById('cropSelectNone');
        const cropPresetBtns = document.querySelectorAll('.crop-preset');

        const toolBtns = document.querySelectorAll('.tool-btn');
        const panelContents = document.querySelectorAll('.panel-content');

        // ========== 状态 ==========
        let layers = [];
        let selectedLayerId = null;
        let nextId = 1;

        let viewTransform = { scale: 1, offsetX: 0, offsetY: 0 };

        let colorPickMode = false;
        let eraseMode = false;
        let brushSize = 20;
        let isErasing = false;

        let isDraggingView = false;
        let dragStartX = 0, dragStartY = 0;
        let dragStartOffsetX = 0, dragStartOffsetY = 0;

        let isDraggingLayer = false;
        let dragLayerStartX = 0, dragLayerStartY = 0;
        let dragLayerOrigX = 0, dragLayerOrigY = 0;
        let draggedLayerId = null;

        let isPinching = false;
        let pinchStartDist = 0;
        let pinchStartScale = 1;
        let pinchStartOffsetX = 0, pinchStartOffsetY = 0;
        let pinchCenterX = 0, pinchCenterY = 0;

        let lastErasePoint = null;
        let touchId = null;

        // ========== 坐标转换 (修复椭圆) ==========
        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const containerWidth = rect.width;
            const containerHeight = rect.height;
            const logicalWidth = canvas.width;
            const logicalHeight = canvas.height;
            const scaleX = containerWidth / logicalWidth;
            const scaleY = containerHeight / logicalHeight;
            const scale = Math.min(scaleX, scaleY);
            const displayWidth = logicalWidth * scale;
            const displayHeight = logicalHeight * scale;
            const offsetX = (containerWidth - displayWidth) / 2;
            const offsetY = (containerHeight - displayHeight) / 2;

            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const logicX = (x - offsetX) / scale;
            const logicY = (y - offsetY) / scale;
            return { x: logicX, y: logicY };
        }

        // ========== 颜色转换 ==========
        function componentToHex(c) { const hex = c.toString(16); return hex.length === 1 ? '0' + hex : hex; }
        function rgbToHex(r, g, b) { return '#' + componentToHex(r) + componentToHex(g) + componentToHex(b); }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        function rgbToHsv(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            const d = max - min;
            let h = 0, s = 0, v = max;
            if (d !== 0) {
                s = d / max;
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), v: Math.round(v * 100) };
        }

        function rgbToCmyk(r, g, b) {
            const cr = 1 - (r / 255), cg = 1 - (g / 255), cb = 1 - (b / 255);
            const k = Math.min(cr, cg, cb);
            if (k === 1) return { c: 0, m: 0, y: 0, k: 100 };
            return {
                c: Math.round(((cr - k) / (1 - k)) * 100),
                m: Math.round(((cg - k) / (1 - k)) * 100),
                y: Math.round(((cb - k) / (1 - k)) * 100),
                k: Math.round(k * 100)
            };
        }

        // ========== 图层核心 ==========

        function createLayer(imageObj, name) {
            const id = nextId++;
            const layerCanvas = document.createElement('canvas');
            layerCanvas.width = imageObj.width;
            layerCanvas.height = imageObj.height;
            const lCtx = layerCanvas.getContext('2d');
            lCtx.imageSmoothingEnabled = true;
            lCtx.drawImage(imageObj, 0, 0);

            const cx = (canvas.width - imageObj.width) / 2;
            const cy = (canvas.height - imageObj.height) / 2;

            const layer = {
                id: id,
                canvas: layerCanvas,
                x: cx,
                y: cy,
                rotation: 0,
                scale: 1,
                visible: true,
                opacity: 1,
                filters: { brightness: 100, contrast: 100, saturation: 100, hue: 0 },
                name: name || `图层 ${id}`,
                image: imageObj
            };
            layers.push(layer);
            selectLayer(id);
            renderAll();
            updateLayerList();
            updateLayerCount();
            uploadOverlay.classList.add('hidden');
            return id;
        }

        function deleteLayer(id) {
            const idx = layers.findIndex(l => l.id === id);
            if (idx === -1) return;
            layers.splice(idx, 1);
            if (selectedLayerId === id) {
                selectedLayerId = layers.length > 0 ? layers[0].id : null;
            }
            renderAll();
            updateLayerList();
            updateControls();
            updateLayerCount();
            if (layers.length === 0) uploadOverlay.classList.remove('hidden');
        }

        function selectLayer(id) {
            selectedLayerId = id;
            updateLayerList();
            updateControls();
            const layer = getSelectedLayer();
            if (layer) {
                layerX.value = layer.x;
                layerY.value = layer.y;
                layerRotation.value = layer.rotation;
                layerScaleSlider.value = Math.round(layer.scale * 100);
                layerScaleVal.textContent = Math.round(layer.scale * 100) + '%';
                layerOpacitySlider.value = Math.round((layer.opacity || 1) * 100);
                layerOpacityVal.textContent = Math.round((layer.opacity || 1) * 100) + '%';
                brightnessSlider.value = layer.filters.brightness;
                contrastSlider.value = layer.filters.contrast;
                saturationSlider.value = layer.filters.saturation;
                hueSlider.value = layer.filters.hue;
                brightnessVal.textContent = layer.filters.brightness + '%';
                contrastVal.textContent = layer.filters.contrast + '%';
                saturationVal.textContent = layer.filters.saturation + '%';
                hueVal.textContent = layer.filters.hue + '°';
                hintMsg.textContent = '💡 已选中图层: ' + layer.name;
            } else {
                hintMsg.textContent = '💡 选中图层才可对图层进行操作';
            }
        }

        function getSelectedLayer() {
            return layers.find(l => l.id === selectedLayerId) || null;
        }

        function moveUpInArray(id) {
            const idx = layers.findIndex(l => l.id === id);
            if (idx <= 0) return;
            [layers[idx], layers[idx - 1]] = [layers[idx - 1], layers[idx]];
            renderAll();
            updateLayerList();
            selectLayer(id);
        }

        function moveDownInArray(id) {
            const idx = layers.findIndex(l => l.id === id);
            if (idx === -1 || idx === layers.length - 1) return;
            [layers[idx], layers[idx + 1]] = [layers[idx + 1], layers[idx]];
            renderAll();
            updateLayerList();
            selectLayer(id);
        }

        function updateLayerList() {
            layerList.innerHTML = '';
            for (let i = layers.length - 1; i >= 0; i--) {
                const layer = layers[i];
                const index = i;
                const div = document.createElement('div');
                div.className = 'layer-item' + (layer.id === selectedLayerId ? ' selected' : '');

                const thumb = document.createElement('canvas');
                thumb.className = 'thumb';
                thumb.width = 32;
                thumb.height = 32;
                const tCtx = thumb.getContext('2d');
                tCtx.imageSmoothingEnabled = true;
                tCtx.drawImage(layer.canvas, 0, 0, 32, 32);
                div.appendChild(thumb);

                const nameSpan = document.createElement('span');
                nameSpan.className = 'layer-name';
                nameSpan.textContent = layer.name;
                div.appendChild(nameSpan);

                const actions = document.createElement('div');
                actions.className = 'layer-actions';

                const upBtn = document.createElement('button');
                upBtn.className = 'move-btn';
                upBtn.textContent = '▲';
                upBtn.title = '上移';
                upBtn.disabled = (index === layers.length - 1);
                upBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (!this.disabled) moveDownInArray(layer.id);
                });
                actions.appendChild(upBtn);

                const downBtn = document.createElement('button');
                downBtn.className = 'move-btn';
                downBtn.textContent = '▼';
                downBtn.title = '下移';
                downBtn.disabled = (index === 0);
                downBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (!this.disabled) moveUpInArray(layer.id);
                });
                actions.appendChild(downBtn);

                const visBtn = document.createElement('button');
                visBtn.className = 'vis-toggle';
                visBtn.textContent = layer.visible ? '👁️' : '👁️‍🗨️';
                visBtn.title = '切换可见性';
                visBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    layer.visible = !layer.visible;
                    renderAll();
                    updateLayerList();
                });
                actions.appendChild(visBtn);

                const delBtn = document.createElement('button');
                delBtn.className = 'del-btn';
                delBtn.textContent = '✕';
                delBtn.title = '删除';
                delBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    deleteLayer(layer.id);
                });
                actions.appendChild(delBtn);

                div.appendChild(actions);
                div.addEventListener('click', function() {
                    selectLayer(layer.id);
                });
                layerList.appendChild(div);
            }
            const sel = getSelectedLayer();
            if (sel) {
                layerX.value = sel.x;
                layerY.value = sel.y;
                layerRotation.value = sel.rotation;
                layerScaleSlider.value = Math.round(sel.scale * 100);
                layerScaleVal.textContent = Math.round(sel.scale * 100) + '%';
                layerOpacitySlider.value = Math.round((sel.opacity || 1) * 100);
                layerOpacityVal.textContent = Math.round((sel.opacity || 1) * 100) + '%';
            }
        }

        function updateLayerCount() {
            layerCountEl.textContent = layers.length + ' 个图层';
        }

        function updateControls() {
            const sel = getSelectedLayer();
            const hasSel = !!sel;
            layerX.disabled = !hasSel;
            layerY.disabled = !hasSel;
            layerRotation.disabled = !hasSel;
            layerScaleSlider.disabled = !hasSel;
            layerOpacitySlider.disabled = !hasSel;
            applyLayerPos.disabled = !hasSel;
            deleteSelectedBtn.disabled = !hasSel;
            brightnessSlider.disabled = !hasSel;
            contrastSlider.disabled = !hasSel;
            saturationSlider.disabled = !hasSel;
            hueSlider.disabled = !hasSel;
            resetLayerFilters.disabled = !hasSel;
            brushSizeSlider.disabled = false;
            clearErasure.disabled = !hasSel;
            if (!hasSel) {
                brightnessSlider.value = 100;
                contrastSlider.value = 100;
                saturationSlider.value = 100;
                hueSlider.value = 0;
                brightnessVal.textContent = '100%';
                contrastVal.textContent = '100%';
                saturationVal.textContent = '100%';
                hueVal.textContent = '0°';
                layerX.value = '';
                layerY.value = '';
                layerRotation.value = '';
                layerScaleSlider.value = 100;
                layerScaleVal.textContent = '100%';
                layerOpacitySlider.value = 100;
                layerOpacityVal.textContent = '100%';
                hintMsg.textContent = '💡 选中图层才可对图层进行操作';
            }
        }

        // ========== 渲染 ==========

        function renderAll() {
            if (layers.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                zoomIndicator.classList.remove('show');
                overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(viewTransform.offsetX, viewTransform.offsetY);
            ctx.scale(viewTransform.scale, viewTransform.scale);

            layers.forEach(layer => {
                if (!layer.visible) return;
                const lw = layer.canvas.width * layer.scale;
                const lh = layer.canvas.height * layer.scale;
                const cx = layer.x + layer.canvas.width / 2;
                const cy = layer.y + layer.canvas.height / 2;
                const angle = layer.rotation * Math.PI / 180;
                const f = layer.filters;
                const filterStr =
                    `brightness(${f.brightness}%) contrast(${f.contrast}%) saturate(${f.saturation}%) hue-rotate(${f.hue}deg)`;
                const opacity = layer.opacity !== undefined ? layer.opacity : 1;

                ctx.save();
                ctx.globalAlpha = opacity;
                ctx.translate(cx, cy);
                ctx.rotate(angle);
                ctx.filter = filterStr;
                ctx.imageSmoothingEnabled = true;
                ctx.drawImage(layer.canvas, -lw / 2, -lh / 2, lw, lh);
                ctx.restore();
            });

            ctx.restore();

            const percent = Math.round(viewTransform.scale * 100);
            zoomIndicator.textContent = percent + '%';
            zoomIndicator.classList.add('show');

            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }

        // ========== 擦除功能 ==========

        function applyEraserAt(layer, x, y, size) {
            const lctx = layer.canvas.getContext('2d');
            lctx.imageSmoothingEnabled = true;
            lctx.save();
            lctx.globalCompositeOperation = 'destination-out';
            lctx.beginPath();
            lctx.arc(x, y, size / 2, 0, Math.PI * 2);
            lctx.fill();
            lctx.restore();
        }

        function eraseLine(layer, x1, y1, x2, y2, size) {
            const dx = x2 - x1, dy = y2 - y1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 1) { applyEraserAt(layer, x1, y1, size); return; }
            const step = Math.max(1, size / 4);
            const steps = Math.max(1, Math.ceil(dist / step));
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                applyEraserAt(layer, x1 + dx * t, y1 + dy * t, size);
            }
        }

        function getLayerCoord(layer, clientX, clientY) {
            const coord = getCanvasCoords(clientX, clientY);
            const cx = coord.x, cy = coord.y;

            const worldX = (cx - viewTransform.offsetX) / viewTransform.scale;
            const worldY = (cy - viewTransform.offsetY) / viewTransform.scale;

            const lcx = layer.x + layer.canvas.width / 2;
            const lcy = layer.y + layer.canvas.height / 2;
            const dx = worldX - lcx;
            const dy = worldY - lcy;
            const angle = -layer.rotation * Math.PI / 180;
            const cosA = Math.cos(angle), sinA = Math.sin(angle);
            const localX = dx * cosA - dy * sinA + layer.canvas.width / 2;
            const localY = dx * sinA + dy * cosA + layer.canvas.height / 2;

            if (localX >= 0 && localX < layer.canvas.width &&
                localY >= 0 && localY < layer.canvas.height) {
                return { x: localX, y: localY };
            }
            return null;
        }

        // ========== 取色 ==========

        function getColorFromCanvas(clientX, clientY) {
            const coord = getCanvasCoords(clientX, clientY);
            const cx = coord.x, cy = coord.y;
            try {
                const pixel = ctx.getImageData(Math.round(cx), Math.round(cy), 1, 1).data;
                const r = pixel[0], g = pixel[1], b = pixel[2];
                const hex = rgbToHex(r, g, b);
                const hsl = rgbToHsl(r, g, b);
                const hsv = rgbToHsv(r, g, b);
                const cmyk = rgbToCmyk(r, g, b);
                colorSwatch.style.background = hex;
                hexDisplay.textContent = hex.toUpperCase();
                vHex.textContent = hex.toUpperCase();
                vRgb.textContent = `${r}, ${g}, ${b}`;
                vHsl.textContent = `${hsl.h}°, ${hsl.s}%, ${hsl.l}%`;
                vHsv.textContent = `${hsv.h}°, ${hsv.s}%, ${hsv.v}%`;
                vCmyk.textContent = `${cmyk.c}, ${cmyk.m}, ${cmyk.y}, ${cmyk.k}`;
            } catch (_) {}
        }

        // ========== 导出 ==========

        function exportImage(format) {
            if (layers.length === 0) { alert('请先添加图层'); return; }

            let globalMinX = Infinity, globalMinY = Infinity;
            let globalMaxX = -Infinity, globalMaxY = -Infinity;
            let hasAnyPixel = false;

            layers.forEach(layer => {
                if (!layer.visible) return;
                const w = layer.canvas.width * layer.scale;
                const h = layer.canvas.height * layer.scale;
                const angle = layer.rotation * Math.PI / 180;
                const cos = Math.abs(Math.cos(angle)), sin = Math.abs(Math.sin(angle));
                const rotW = w * cos + h * sin;
                const rotH = w * sin + h * cos;
                const cx = layer.x + layer.canvas.width / 2;
                const cy = layer.y + layer.canvas.height / 2;
                const x1 = cx - rotW / 2, y1 = cy - rotH / 2;
                const x2 = cx + rotW / 2, y2 = cy + rotH / 2;
                if (x1 < globalMinX) globalMinX = x1;
                if (y1 < globalMinY) globalMinY = y1;
                if (x2 > globalMaxX) globalMaxX = x2;
                if (y2 > globalMaxY) globalMaxY = y2;
                hasAnyPixel = true;
            });

            if (!hasAnyPixel || !isFinite(globalMinX)) { alert('没有可见的图层内容'); return; }
            const outW = Math.ceil(globalMaxX - globalMinX);
            const outH = Math.ceil(globalMaxY - globalMinY);
            if (outW < 1 || outH < 1) { alert('导出区域太小'); return; }

            const outCanvas = document.createElement('canvas');
            outCanvas.width = outW;
            outCanvas.height = outH;
            const outCtx = outCanvas.getContext('2d');
            outCtx.imageSmoothingEnabled = true;
            outCtx.imageSmoothingQuality = 'high';

            if (format === 'jpg') {
                outCtx.fillStyle = '#FFFFFF';
                outCtx.fillRect(0, 0, outW, outH);
            }

            layers.forEach(layer => {
                if (!layer.visible) return;
                const lw = layer.canvas.width * layer.scale;
                const lh = layer.canvas.height * layer.scale;
                const cx = layer.x + layer.canvas.width / 2 - globalMinX;
                const cy = layer.y + layer.canvas.height / 2 - globalMinY;
                const angle = layer.rotation * Math.PI / 180;
                const f = layer.filters;
                const filterStr =
                    `brightness(${f.brightness}%) contrast(${f.contrast}%) saturate(${f.saturation}%) hue-rotate(${f.hue}deg)`;
                const opacity = layer.opacity !== undefined ? layer.opacity : 1;

                outCtx.save();
                outCtx.globalAlpha = opacity;
                outCtx.translate(cx, cy);
                outCtx.rotate(angle);
                outCtx.filter = filterStr;
                outCtx.imageSmoothingEnabled = true;
                outCtx.drawImage(layer.canvas, -lw / 2, -lh / 2, lw, lh);
                outCtx.restore();
            });

            let mimeType = '', ext = '';
            switch (format) {
                case 'png': mimeType = 'image/png'; ext = 'png'; break;
                case 'jpg': mimeType = 'image/jpeg'; ext = 'jpg'; break;
                case 'webp': mimeType = 'image/webp'; ext = 'webp'; break;
                case 'bmp': mimeType = 'image/bmp'; ext = 'bmp'; break;
                default: return;
            }

            try {
                outCanvas.toBlob(function(blob) {
                    if (!blob) {
                        const dataUrl = outCanvas.toDataURL(mimeType, 0.95);
                        download(dataUrl, `image.${ext}`);
                        return;
                    }
                    const url = URL.createObjectURL(blob);
                    download(url, `image.${ext}`);
                    setTimeout(() => URL.revokeObjectURL(url), 5000);
                }, mimeType, 0.95);
            } catch (_) {
                const dataUrl = outCanvas.toDataURL(mimeType, 0.95);
                download(dataUrl, `image.${ext}`);
            }
        }

        function download(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);

            document.body.removeChild(a);

        function updateCropLayerCheckboxes() {

        function getCheckedLayerIds() {
            const ids = [];

        function getCheckedLayers() {

        function cropLayers(ratioW, ratioH) {
            if (ratioW <= 0 || ratioH <= 0) {
                alert('请输入有效的宽高比（大于0）');
                return false;
            }
            const targetRatio = ratioW / ratioH;
            const selectedLayers = getCheckedLayers();
            if (selectedLayers.length === 0) {
                alert('请至少勾选一个要裁剪的图层');
                return false;
            }

            let croppedCount = 0;
            selectedLayers.forEach(layer => {
                const w = layer.canvas.width;
                const h = layer.canvas.height;
                const currentRatio = w / h;

                if (Math.abs(currentRatio - targetRatio) < 0.0001) {
                    return;
                }

                let newW, newH, sx, sy;
                if (targetRatio > currentRatio) {
                    newH = h;
                    newW = h * targetRatio;
                    if (newW > w) {
                        newW = w;
                        newH = w / targetRatio;
                        sx = 0;
                        sy = (h - newH) / 2;
                    } else {
                        sx = (w - newW) / 2;
                        sy = 0;
                    }
                } else {
                    newW = w;
                    newH = w / targetRatio;
                    if (newH > h) {
                        newH = h;
                        newW = h * targetRatio;
                        sx = (w - newW) / 2;
                        sy = 0;
                    } else {
                        sx = 0;
                        sy = (h - newH) / 2;
                    }
                }

                newW = Math.round(newW);
                newH = Math.round(newH);
                sx = Math.round(sx);
                sy = Math.round(sy);

                if (newW < 1 || newH < 1) {
                    return;
                }

                const newCanvas = document.createElement('canvas');
                newCanvas.width = newW;
                newCanvas.height = newH;
                const newCtx = newCanvas.getContext('2d');
                newCtx.imageSmoothingEnabled = true;
                newCtx.imageSmoothingQuality = 'high';
                newCtx.drawImage(layer.canvas, sx, sy, newW, newH, 0, 0, newW, newH);

                layer.canvas = newCanvas;

                const imgCanvas = document.createElement('canvas');
                imgCanvas.width = newW;
                imgCanvas.height = newH;
                const imgCtx = imgCanvas.getContext('2d');
                imgCtx.imageSmoothingEnabled = true;
                imgCtx.drawImage(newCanvas, 0, 0);
                const tempImg = new Image();
                tempImg.onload = function() {
                    layer.image = tempImg;
                    renderAll();
                    updateLayerList();
                    updateCropLayerCheckboxes();
                };
                tempImg.src = imgCanvas.toDataURL('image/png');

                const oldW = w, oldH = h;
                layer.x += (oldW - newW) / 2;
                layer.y += (oldH - newH) / 2;

                croppedCount++;
            });

            renderAll();
            updateLayerList();
            updateCropLayerCheckboxes();

            if (croppedCount > 0) {
                hintMsg.textContent = '✅ 已裁剪 ' + croppedCount + ' 个图层';
            } else {
                hintMsg.textContent = 'ℹ️ 没有图层被裁剪（比例可能已匹配）';
            }
            return true;
        }

        // =============================================

        canvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -1 : 1;
            const factor = 1 + delta * 0.1;
            const newScale = Math.min(Math.max(viewTransform.scale * factor, 0.1), 10);
            const coord = getCanvasCoords(e.clientX, e.clientY);
            const mx = coord.x, my = coord.y;
            const wx = (mx - viewTransform.offsetX) / viewTransform.scale;
            const wy = (my - viewTransform.offsetY) / viewTransform.scale;
            viewTransform.scale = newScale;
            viewTransform.offsetX = mx - wx * newScale;
            viewTransform.offsetY = my - wy * newScale;
            renderAll();
        }, { passive: false });

        canvas.addEventListener('mousemove', function(e) {
            if (eraseMode) {
                updateEraseCursor(e.clientX, e.clientY);
                if (isErasing) {
                    const layer = getSelectedLayer();
                    if (!layer) return;
                    const coord = getLayerCoord(layer, e.clientX, e.clientY);
                    if (coord) {
                        if (lastErasePoint) {
                            eraseLine(layer, lastErasePoint.x, lastErasePoint.y, coord.x, coord.y, brushSize);
                        } else {
                            applyEraserAt(layer, coord.x, coord.y, brushSize);
                        }
                        lastErasePoint = coord;
                        renderAll();
                        updateLayerList();
                    }
                }
            }
        });

        canvas.addEventListener('mouseleave', function() {
            if (eraseMode) {
                overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            }
            lastErasePoint = null;
        });

        canvas.addEventListener('mousedown', function(e) {
            if (colorPickMode) {
                getColorFromCanvas(e.clientX, e.clientY);
                return;
            }
            if (eraseMode) {
                const layer = getSelectedLayer();
                if (!layer) return;
                const coord = getLayerCoord(layer, e.clientX, e.clientY);
                if (coord) {
                    applyEraserAt(layer, coord.x, coord.y, brushSize);
                    lastErasePoint = coord;
                    renderAll();
                    updateLayerList();
                    isErasing = true;
                }
                return;
            }

            // 点击选中图层
            const coord = getCanvasCoords(e.clientX, e.clientY);
            const worldX = (coord.x - viewTransform.offsetX) / viewTransform.scale;
            const worldY = (coord.y - viewTransform.offsetY) / viewTransform.scale;
            let found = false;
            for (let i = layers.length - 1; i >= 0; i--) {
                const layer = layers[i];
                if (!layer.visible) continue;
                const lcx = layer.x + layer.canvas.width / 2;
                const lcy = layer.y + layer.canvas.height / 2;
                const dx = worldX - lcx;
                const dy = worldY - lcy;
                const angle = -layer.rotation * Math.PI / 180;
                const cosA = Math.cos(angle), sinA = Math.sin(angle);
                const localX = dx * cosA - dy * sinA + layer.canvas.width / 2;
                const localY = dx * sinA + dy * cosA + layer.canvas.height / 2;
                if (localX >= 0 && localX < layer.canvas.width && localY >= 0 && localY < layer.canvas.height) {
                    selectLayer(layer.id);
                    found = true;
                    break;
                }
            }
            if (!found) {
                selectedLayerId = null;
                selectLayer(null);
            }

            const layer = getSelectedLayer();
            if (!layer) {
                isDraggingView = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                dragStartOffsetX = viewTransform.offsetX;
                dragStartOffsetY = viewTransform.offsetY;
                canvas.style.cursor = 'grabbing';
                return;
            }
            const coord2 = getLayerCoord(layer, e.clientX, e.clientY);
            if (coord2) {
                isDraggingLayer = true;
                draggedLayerId = layer.id;
                dragLayerStartX = e.clientX;
                dragLayerStartY = e.clientY;
                dragLayerOrigX = layer.x;
                dragLayerOrigY = layer.y;
                canvas.style.cursor = 'move';
            } else {
                isDraggingView = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                dragStartOffsetX = viewTransform.offsetX;
                dragStartOffsetY = viewTransform.offsetY;
                canvas.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', function(e) {
            if (isDraggingView) {
                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                viewTransform.offsetX = dragStartOffsetX + dx * scaleX;
                viewTransform.offsetY = dragStartOffsetY + dy * scaleY;
                renderAll();
            } else if (isDraggingLayer) {
                const dx = e.clientX - dragLayerStartX;
                const dy = e.clientY - dragLayerStartY;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const deltaX = dx * scaleX / viewTransform.scale;
                const deltaY = dy * scaleY / viewTransform.scale;
                const layer = layers.find(l => l.id === draggedLayerId);
                if (layer) {
                    layer.x = dragLayerOrigX + deltaX;
                    layer.y = dragLayerOrigY + deltaY;
                    renderAll();
                    updateLayerList();
                    layerX.value = layer.x;
                    layerY.value = layer.y;
                }
            }
        });

        window.addEventListener('mouseup', function() {
            if (isDraggingView || isDraggingLayer) {
                isDraggingView = false;
                isDraggingLayer = false;

        // =============================================
        //  触摸事件
        // =============================================

        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const touches = e.touches;

            if (touches.length === 2) {
                isDraggingView = false;
                isDraggingLayer = false;
                isErasing = false;
                lastErasePoint = null;

                const t1 = touches[0], t2 = touches[1];
                const dx = t1.clientX - t2.clientX;
                const dy = t1.clientY - t2.clientY;
                pinchStartDist = Math.sqrt(dx * dx + dy * dy);
                pinchStartScale = viewTransform.scale;
                pinchStartOffsetX = viewTransform.offsetX;
                pinchStartOffsetY = viewTransform.offsetY;
                pinchCenterX = (t1.clientX + t2.clientX) / 2;
                pinchCenterY = (t1.clientY + t2.clientY) / 2;
                isPinching = true;
                return;
            }

            if (touches.length === 1) {
                const touch = touches[0];
                const clientX = touch.clientX, clientY = touch.clientY;

                if (colorPickMode) {
                    getColorFromCanvas(clientX, clientY);
                    return;
                }

                if (eraseMode) {
                    const layer = getSelectedLayer();
                    if (!layer) return;
                    const coord = getLayerCoord(layer, clientX, clientY);
                    if (coord) {
                        applyEraserAt(layer, coord.x, coord.y, brushSize);
                        lastErasePoint = coord;
                        renderAll();
                        updateLayerList();
                        isErasing = true;
                        touchId = touch.identifier;
                    }
                    return;
                }

                // 点击选中图层
                const coord = getCanvasCoords(clientX, clientY);
                const worldX = (coord.x - viewTransform.offsetX) / viewTransform.scale;
                const worldY = (coord.y - viewTransform.offsetY) / viewTransform.scale;
                let found = false;
                for (let i = layers.length - 1; i >= 0; i--) {
                    const layer = layers[i];
                    if (!layer.visible) continue;
                    const lcx = layer.x + layer.canvas.width / 2;
                    const lcy = layer.y + layer.canvas.height / 2;
                    const dx = worldX - lcx;
                    const dy = worldY - lcy;
                    const angle = -layer.rotation * Math.PI / 180;
                    const cosA = Math.cos(angle), sinA = Math.sin(angle);
                    const localX = dx * cosA - dy * sinA + layer.canvas.width / 2;
                    const localY = dx * sinA + dy * cosA + layer.canvas.height / 2;
                    if (localX >= 0 && localX < layer.canvas.width && localY >= 0 && localY < layer.canvas.height) {
                        selectLayer(layer.id);
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    selectedLayerId = null;
                    selectLayer(null);
                }

                const layer = getSelectedLayer();
                if (!layer) {
                    isDraggingView = true;
                    dragStartX = clientX;
                    dragStartY = clientY;
                    dragStartOffsetX = viewTransform.offsetX;
                    dragStartOffsetY = viewTransform.offsetY;
                    return;
                }
                const coord2 = getLayerCoord(layer, clientX, clientY);
                if (coord2) {
                    isDraggingLayer = true;
                    draggedLayerId = layer.id;
                    dragLayerStartX = clientX;
                    dragLayerStartY = clientY;
                    dragLayerOrigX = layer.x;
                    dragLayerOrigY = layer.y;
                } else {
                    isDraggingView = true;
                    dragStartX = clientX;
                    dragStartY = clientY;
                    dragStartOffsetX = viewTransform.offsetX;
                    dragStartOffsetY = viewTransform.offsetY;
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const touches = e.touches;

            if (touches.length === 2 && isPinching) {
                const t1 = touches[0], t2 = touches[1];
                const dx = t1.clientX - t2.clientX;
                const dy = t1.clientY - t2.clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const scaleFactor = dist / pinchStartDist;
                let newScale = Math.min(Math.max(pinchStartScale * scaleFactor, 0.1), 10);
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const mx = (pinchCenterX - rect.left) * scaleX;
                const my = (pinchCenterY - rect.top) * scaleY;
                const wx = (mx - pinchStartOffsetX) / pinchStartScale;
                const wy = (my - pinchStartOffsetY) / pinchStartScale;
                viewTransform.scale = newScale;
                viewTransform.offsetX = mx - wx * newScale;
                viewTransform.offsetY = my - wy * newScale;
                renderAll();
                return;
            }

            if (eraseMode && isErasing && touches.length === 1) {
                const touch = touches[0];
                if (touch.identifier === touchId) {
                    const layer = getSelectedLayer();
                    if (!layer) return;
                    const coord = getLayerCoord(layer, touch.clientX, touch.clientY);
                    if (coord) {
                        if (lastErasePoint) {
                            eraseLine(layer, lastErasePoint.x, lastErasePoint.y, coord.x, coord.y, brushSize);
                        } else {
                            applyEraserAt(layer, coord.x, coord.y, brushSize);
                        }
                        lastErasePoint = coord;
                        renderAll();
                        updateLayerList();
                    }
                }
                return;
            }

            if (touches.length === 1) {
                const touch = touches[0];
                const clientX = touch.clientX, clientY = touch.clientY;
                if (isDraggingView) {
                    const dx = clientX - dragStartX;
                    const dy = clientY - dragStartY;
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    viewTransform.offsetX = dragStartOffsetX + dx * scaleX;
                    viewTransform.offsetY = dragStartOffsetY + dy * scaleY;
                    renderAll();
                } else if (isDraggingLayer) {
                    const dx = clientX - dragLayerStartX;
                    const dy = clientY - dragLayerStartY;
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const deltaX = dx * scaleX / viewTransform.scale;
                    const deltaY = dy * scaleY / viewTransform.scale;
                    const layer = layers.find(l => l.id === draggedLayerId);
                    if (layer) {
                        layer.x = dragLayerOrigX + deltaX;
                        layer.y = dragLayerOrigY + deltaY;
                        renderAll();
                        updateLayerList();
                        layerX.value = layer.x;
                        layerY.value = layer.y;
                    }
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            if (isErasing) {
                isErasing = false;
                lastErasePoint = null;
                touchId = null;
            }
            if (isDraggingView || isDraggingLayer) {
                isDraggingView = false;
                isDraggingLayer = false;
                draggedLayerId = null;
            }
            if (isPinching) {
                isPinching = false;
            }
            if (e.touches.length === 0) {
                isDraggingView = false;
                isDraggingLayer = false;
                isErasing = false;
                touchId = null;
                lastErasePoint = null;
            }
        }, { passive: false });

        canvas.addEventListener('touchcancel', function(e) {
            e.preventDefault();
            isDraggingView = false;
            isDraggingLayer = false;
            isErasing = false;
            touchId = null;
            lastErasePoint = null;
            isPinching = false;
        }, { passive: false });

        // =============================================
        //  初始化
        // =============================================

        canvas.width = 700;
        canvas.height = 480;
        overlayCanvas.width = canvas.width;
        overlayCanvas.height = canvas.height;

        viewTransform.scale = 1;
        viewTransform.offsetX = 0;
        viewTransform.offsetY = 0;

        setMode('select');
        switchTool('upload');
        updateLayerCount();

        console.log('🖼️ 多图层编辑器 (顶部工具栏)');
    })();
</script>
