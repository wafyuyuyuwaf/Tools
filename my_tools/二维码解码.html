<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>二维码读取器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #1e1e2e;
            color: #cdd6f4;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 780px;
            width: 100%;
            background: #313244;
            padding: 28px 30px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid #45475a;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .header h2 {
            color: #89b4fa;
            font-size: 24px;
            letter-spacing: 0.5px;
        }
        .header .top-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .header .top-actions button {
            padding: 6px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            background: #45475a;
            color: #cdd6f4;
        }
        .header .top-actions button.clear-all-btn {
            background: #f38ba8;
            color: #1e1e2e;
        }
        .header .top-actions button.clear-all-btn:hover {
            background: #e06b8a;
            transform: scale(1.02);
        }

        .sub {
            color: #6c7086;
            font-size: 14px;
            margin-bottom: 18px;
            border-left: 3px solid #89b4fa;
            padding-left: 14px;
            margin-top: 2px;
        }
        .notice {
            background: #45475a;
            padding: 10px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            border-left: 4px solid #f9e2af;
            color: #cdd6f4;
        }
        .notice strong {
            color: #f9e2af;
        }
        .notice .extra-tip {
            display: block;
            margin-top: 6px;
            color: #f9e2af;
            font-weight: 500;
        }

        /* 模式切换 */
        .mode-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .mode-switch button {
            padding: 8px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            background: #45475a;
            color: #cdd6f4;
        }
        .mode-switch button.active {
            background: #89b4fa;
            color: #1e1e2e;
        }
        .mode-switch button:hover {
            transform: scale(1.02);
        }
        .mode-switch .mode-hint {
            font-size: 12px;
            color: #a6adc8;
            margin-left: 4px;
        }

        /* 自定义设置面板 */
        .custom-settings {
            background: #1e1e2e;
            border: 1px solid #45475a;
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 16px;
            display: none;
            flex-wrap: wrap;
            gap: 14px 20px;
            align-items: center;
        }
        .custom-settings.show {
            display: flex;
        }
        .custom-settings .setting-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .custom-settings .setting-group label {
            font-size: 13px;
            color: #a6adc8;
            font-weight: 600;
        }
        .custom-settings .setting-group select,
        .custom-settings .setting-group input[type="number"] {
            background: #0f0f1a;
            border: 1px solid #45475a;
            border-radius: 6px;
            color: #cdd6f4;
            padding: 4px 8px;
            font-size: 13px;
            outline: none;
            width: 80px;
        }
        .custom-settings .setting-group select:focus,
        .custom-settings .setting-group input[type="number"]:focus {
            border-color: #89b4fa;
        }
        .custom-settings .setting-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #89b4fa;
            cursor: pointer;
        }
        .custom-settings .setting-group .checkbox-label {
            font-size: 13px;
            color: #cdd6f4;
            cursor: pointer;
        }

        .workspace {
            background: #1e1e2e;
            border-radius: 16px;
            padding: 16px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px dashed #45475a;
            transition: border-color 0.3s;
            margin-bottom: 16px;
            position: relative;
        }
        .workspace.drag-over {
            border-color: #89b4fa;
            background: #2a2a3e;
        }
        .drop-zone {
            width: 100%;
            min-height: 180px;
            border: 2px dashed #45475a;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            padding: 20px;
            background: #1e1e2e;
        }
        .drop-zone:hover {
            border-color: #89b4fa;
            background: #2a2a3e;
        }
        .drop-zone .icon {
            font-size: 44px;
            margin-bottom: 8px;
        }
        .drop-zone p {
            color: #a6adc8;
            font-size: 15px;
        }
        .drop-zone .sub-hint {
            color: #6c7086;
            font-size: 13px;
            margin-top: 4px;
        }
        .drop-zone input[type="file"] {
            display: none;
        }
        .preview-wrap {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            background: #1e1e2e;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #45475a;
            cursor: pointer;
            transition: 0.2s;
        }
        .preview-wrap:hover {
            border-color: #89b4fa;
            background: #2a2a3e;
        }
        .preview-wrap img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            background: #fff;
            pointer-events: none;
        }
        .preview-wrap .file-name {
            color: #a6adc8;
            font-size: 13px;
            margin-top: 8px;
            pointer-events: none;
        }
        .preview-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
        .preview-actions button {
            padding: 6px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            background: #45475a;
            color: #cdd6f4;
        }
        .preview-actions .rechoose-btn {
            background: #89b4fa;
            color: #1e1e2e;
        }
        .preview-actions .rechoose-btn:hover {
            background: #74c7ec;
            transform: scale(1.02);
        }
        .preview-actions .clear-btn:hover {
            background: #f38ba8;
            color: #1e1e2e;
        }

        .result-box {
            background: #1e1e2e;
            border-radius: 14px;
            padding: 14px 18px;
            border: 1px solid #45475a;
            margin-top: 4px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .result-box.show {
            display: block !important;
        }
        .result-box .label {
            font-size: 13px;
            font-weight: 600;
            color: #a6adc8;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .result-box .label .badge {
            padding: 0 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge.success {
            background: #a6e3a1;
            color: #1e1e2e;
        }
        .badge.error {
            background: #f38ba8;
            color: #1e1e2e;
        }
        .result-box .content {
            background: #0f0f1a;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 15px;
            word-break: break-all;
            color: #cdd6f4;
            font-family: 'Segoe UI', monospace;
            min-height: 40px;
            border: 1px solid #313244;
            max-height: 160px;
            overflow-y: auto;
        }
        .result-box .content .empty-hint {
            color: #6c7086;
            font-style: italic;
        }
        .result-box .content .error-text {
            color: #f38ba8;
            font-weight: 500;
        }
        .result-box .content .success-text {
            color: #a6e3a1;
        }
        .result-box .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .result-box .actions button {
            padding: 8px 22px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            background: #45475a;
            color: #cdd6f4;
        }
        .result-box .actions button.copy-btn {
            background: #89b4fa;
            color: #1e1e2e;
        }
        .result-box .actions button.copy-btn:hover {
            background: #74c7ec;
            transform: scale(1.02);
        }
        .result-box .actions button.rescan-btn {
            background: #a6e3a1;
            color: #1e1e2e;
            font-size: 15px;
            padding: 8px 28px;
        }
        .result-box .actions button.rescan-btn:hover {
            background: #94d88f;
            transform: scale(1.02);
        }
        .result-box .actions button:hover:not(.copy-btn):not(.rescan-btn) {
            background: #585b70;
        }
        .result-box .retry-hint {
            color: #f9e2af;
            font-weight: 600;
            margin-top: 6px;
            font-size: 14px;
            display: none;
        }
        .result-box .retry-hint.show {
            display: block;
        }

        .toast {
            background: #45475a;
            color: #cdd6f4;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            border-left: 4px solid #89b4fa;
        }
        .toast.show {
            display: block;
        }
        .toast.error {
            border-left-color: #f38ba8;
            background: #3a2a2e;
        }
        .toast.success {
            border-left-color: #a6e3a1;
            background: #2a3a2e;
        }

        .footer-link {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid #45475a;
            text-align: center;
            width: 100%;
        }
        .footer-link a {
            color: #89b4fa;
            text-decoration: underline dotted;
            text-underline-offset: 5px;
            text-decoration-thickness: 2px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.25s, text-underline-offset 0.25s;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 6px;
        }
        .footer-link a:hover {
            color: #74c7ec;
            text-underline-offset: 8px;
        }
        .footer-link a:active {
            transform: scale(0.96);
        }

        .debug-log {
            background: #1e1e2e;
            border: 1px solid #45475a;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: #a6adc8;
            margin-top: 8px;
            max-height: 120px;
            overflow-y: auto;
            display: none;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .debug-log.show {
            display: block;
        }

        .float-rescan {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
        }
        .float-rescan button {
            padding: 14px 32px;
            background: #a6e3a1;
            color: #1e1e2e;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .float-rescan button:hover {
            background: #94d88f;
            transform: scale(1.04);
        }
        .float-rescan button:active {
            transform: scale(0.96);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            .header h2 {
                font-size: 20px;
            }
            .workspace {
                min-height: 200px;
                padding: 12px;
            }
            .result-box .content {
                font-size: 13px;
                max-height: 120px;
            }
            .result-box .actions button {
                font-size: 13px;
                padding: 6px 16px;
            }
            .float-rescan {
                bottom: 16px;
                right: 16px;
            }
            .float-rescan button {
                padding: 10px 22px;
                font-size: 16px;
            }
            .custom-settings {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .custom-settings .setting-group {
                justify-content: space-between;
            }
        }
        .result-box .content::-webkit-scrollbar {
            width: 4px;
        }
        .result-box .content::-webkit-scrollbar-track {
            background: #1e1e2e;
        }
        .result-box .content::-webkit-scrollbar-thumb {
            background: #45475a;
            border-radius: 4px;
        }
        .result-box .content::-webkit-scrollbar-thumb:hover {
            background: #585b70;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>二维码读取器</h2>
            <div class="top-actions">
                <button class="clear-all-btn" id="clearAllBtn">一键清空</button>
            </div>
        </div>
        <div class="sub">上传图片自动解码，失败后可点击右下角继续扫码</div>
        <div class="notice">
            <strong>提示：</strong> 若识别失败，点击右下角「继续扫码」按钮重新开始。
            <span class="extra-tip">已灰度化后如果没有结果，则为扫描失败，图片对比度可能较低或者二维码不规则</span>
        </div>

        <!-- 模式切换 -->
        <div class="mode-switch">
            <button id="quickModeBtn" class="active">快速模式</button>
            <button id="exhaustiveModeBtn">穷举模式 <span class="mode-hint">(可能较慢)</span></button>
            <button id="customModeBtn">自定义模式</button>
        </div>

        <!-- 自定义设置面板 -->
        <div class="custom-settings" id="customSettings">
            <div class="setting-group">
                <label for="channelSelect">通道</label>
                <select id="channelSelect">
                    <option value="gray">灰度</option>
                    <option value="red">红色</option>
                    <option value="green">绿色</option>
                    <option value="blue">蓝色</option>
                </select>
            </div>
            <div class="setting-group">
                <label for="thresholdInput">阈值</label>
                <input type="number" id="thresholdInput" value="128" min="0" max="255" step="1" />
            </div>
            <div class="setting-group">
                <input type="checkbox" id="invertCheck" />
                <label for="invertCheck" class="checkbox-label">反色</label>
            </div>
            <div class="setting-group">
                <input type="checkbox" id="morphCheck" />
                <label for="morphCheck" class="checkbox-label">形态学</label>
            </div>
        </div>

        <div class="workspace" id="workspace">
            <div class="drop-zone" id="dropZone">
                <div class="icon">+</div>
                <p>点击或拖拽上传二维码图片</p>
                <div class="sub-hint">支持 JPG / PNG / WebP</div>
                <input type="file" id="fileInput" accept="image/*" />
            </div>
            <div class="preview-wrap" id="previewWrap">
                <img id="previewImg" alt="预览" />
                <div class="file-name" id="fileName">未选择</div>
                <div class="preview-actions">
                    <button class="rechoose-btn" id="rechooseBtn">重新选择</button>
                    <button class="clear-btn" id="clearBtn">清除图片</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast">
            <span class="toast-icon"></span>
            <span class="toast-text"></span>
        </div>

        <div class="result-box" id="resultBox">
            <div class="label">
                解码结果
                <span class="badge" id="resultBadge">成功</span>
            </div>
            <div class="content" id="resultContent">
                <span class="empty-hint">等待扫描...</span>
            </div>
            <div class="retry-hint" id="retryHint">扫码失败，请点击右下角「继续扫码」重新尝试</div>
            <div class="actions">
                <button class="copy-btn" id="copyBtn">复制结果</button>
                <button class="rescan-btn" id="rescanBtn">继续扫码</button>
                <button id="clearResultBtn">清空结果</button>
            </div>
        </div>

        <div class="debug-log" id="debugLog"></div>

        <div class="footer-link">
            <a href="https://wafyuyuyuwaf.github.io/wafyuyuyuwaf/my_tools/二维码生成器.html" target="_blank">去生成二维码</a>
        </div>
    </div>

    <div class="float-rescan" id="floatRescan">
        <button id="floatRescanBtn">继续扫码</button>
    </div>

    <script>
        if (typeof Html5Qrcode === 'undefined') {
            document.querySelector('.workspace').innerHTML =
                '<div style="color:#f38ba8;text-align:center;padding:30px;">二维码库加载失败，请刷新页面或检查网络。</div>';
            throw new Error('Html5Qrcode library not loaded');
        }

        // DOM 引用
        var dropZone = document.getElementById('dropZone');
        var fileInput = document.getElementById('fileInput');
        var previewWrap = document.getElementById('previewWrap');
        var previewImg = document.getElementById('previewImg');
        var fileName = document.getElementById('fileName');
        var rechooseBtn = document.getElementById('rechooseBtn');
        var clearBtn = document.getElementById('clearBtn');
        var resultBox = document.getElementById('resultBox');
        var resultContent = document.getElementById('resultContent');
        var resultBadge = document.getElementById('resultBadge');
        var retryHint = document.getElementById('retryHint');
        var copyBtn = document.getElementById('copyBtn');
        var clearResultBtn = document.getElementById('clearResultBtn');
        var rescanBtn = document.getElementById('rescanBtn');
        var floatRescanBtn = document.getElementById('floatRescanBtn');
        var toast = document.getElementById('toast');
        var toastText = toast.querySelector('.toast-text');
        var toastIcon = toast.querySelector('.toast-icon');
        var workspace = document.getElementById('workspace');
        var debugLog = document.getElementById('debugLog');

        var quickModeBtn = document.getElementById('quickModeBtn');
        var exhaustiveModeBtn = document.getElementById('exhaustiveModeBtn');
        var customModeBtn = document.getElementById('customModeBtn');
        var customSettings = document.getElementById('customSettings');
        var channelSelect = document.getElementById('channelSelect');
        var thresholdInput = document.getElementById('thresholdInput');
        var invertCheck = document.getElementById('invertCheck');
        var morphCheck = document.getElementById('morphCheck');
        var clearAllBtn = document.getElementById('clearAllBtn');

        var scanInProgress = false;
        var hasPreview = false;
        var currentMode = 'quick'; // 'quick' | 'exhaustive' | 'custom'
        var cancelDecode = false; // 用于终止解码

        // 模式切换
        function setMode(mode) {
            if (scanInProgress) {
                // 如果正在解码，先终止
                cancelDecode = true;
                scanInProgress = false;
                showToast('正在终止当前解码...', 'info', 1500);
                // 等待一小段时间让异步操作响应
                setTimeout(function() {
                    doSetMode(mode);
                }, 300);
                return;
            }
            doSetMode(mode);
        }

        function doSetMode(mode) {
            currentMode = mode;
            // 更新按钮样式
            quickModeBtn.classList.remove('active');
            exhaustiveModeBtn.classList.remove('active');
            customModeBtn.classList.remove('active');
            if (mode === 'quick') {
                quickModeBtn.classList.add('active');
                customSettings.classList.remove('show');
                showToast('切换到快速模式', 'info', 1500);
            } else if (mode === 'exhaustive') {
                exhaustiveModeBtn.classList.add('active');
                customSettings.classList.remove('show');
                showToast('切换到穷举模式（含反色），扫描时间可能较长', 'info', 3000);
            } else if (mode === 'custom') {
                customModeBtn.classList.add('active');
                customSettings.classList.add('show');
                showToast('切换到自定义模式，请设置参数后上传图片', 'info', 2000);
            }
            log('切换到模式: ' + mode);
            // 清空之前的结果和日志
            clearResult();
            clearLog();
        }

        quickModeBtn.addEventListener('click', function() { setMode('quick'); });
        exhaustiveModeBtn.addEventListener('click', function() { setMode('exhaustive'); });
        customModeBtn.addEventListener('click', function() { setMode('custom'); });

        // 一键清空
        clearAllBtn.addEventListener('click', function() {
            // 终止解码
            cancelDecode = true;
            scanInProgress = false;
            // 重置所有
            resetAll();
            showToast('已清空所有', 'info', 1500);
            log('一键清空');
        });

        function log(msg) {
            debugLog.classList.add('show');
            debugLog.textContent += msg + '\n';
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(msg);
        }

        function clearLog() {
            debugLog.textContent = '';
            debugLog.classList.remove('show');
        }

        function showToast(message, type, duration) {
            duration = duration || 3000;
            toast.className = 'toast show';
            if (type === 'error') {
                toast.className = 'toast show error';
                toastIcon.textContent = '!';
            } else if (type === 'success') {
                toast.className = 'toast show success';
                toastIcon.textContent = 'v';
            } else {
                toastIcon.textContent = 'i';
            }
            toastText.textContent = message;
            clearTimeout(toast._timer);
            toast._timer = setTimeout(function() {

        // ============================================================
        //  辅助函数：解码Canvas
        // ============================================================
        function decodeCanvas(canvas) {
            return new Promise(function(resolve, reject) {
                canvas.toBlob(function(blob) {
                    if (!blob) {
                        reject(new Error('Blob生成失败'));
                        return;
                    }
                    var processedFile = new File([blob], 'processed.png', { type: 'image/png' });
                    var tempScanner = new Html5Qrcode('workspace');
                    tempScanner.scanFile(processedFile, { useReverse: false })
                        .then(function(decodedText) {
                            resolve(decodedText);
                        })
                        .catch(function(err) {
                            reject(err);
                        });
                }, 'image/png');
            });
        }

        // ============================================================
        //  形态学闭运算（膨胀+腐蚀）
        // ============================================================
        function morphologicalClose(ctx, width, height) {
            var imageData = ctx.getImageData(0, 0, width, height);
            var data = imageData.data;
            var output = new Uint8ClampedArray(data.length);

            for (var y = 1; y < height - 1; y++) {
                for (var x = 1; x < width - 1; x++) {
                    var idx = (y * width + x) * 4;
                    var white = false;
                    for (var dy = -1; dy <= 1; dy++) {
                        for (var dx = -1; dx <= 1; dx++) {
                            var nIdx = ((y + dy) * width + (x + dx)) * 4;
                            if (data[nIdx] > 128) {
                                white = true;
                                break;
                            }
                        }
                        if (white) break;
                    }
                    if (white) {
                        output[idx] = 255;
                        output[idx + 1] = 255;
                        output[idx + 2] = 255;
                        output[idx + 3] = 255;
                    } else {
                        output[idx] = 0;
                        output[idx + 1] = 0;
                        output[idx + 2] = 0;
                        output[idx + 3] = 255;
                    }
                }
            }

            var eroded = new Uint8ClampedArray(output.length);
            for (var y = 1; y < height - 1; y++) {
                for (var x = 1; x < width - 1; x++) {
                    var idx = (y * width + x) * 4;
                    var black = false;
                    for (var dy = -1; dy <= 1; dy++) {
                        for (var dx = -1; dx <= 1; dx++) {
                            var nIdx = ((y + dy) * width + (x + dx)) * 4;
                            if (output[nIdx] < 128) {
                                black = true;
                                break;
                            }
                        }
                        if (black) break;
                    }
                    if (black) {
                        eroded[idx] = 0;
                        eroded[idx + 1] = 0;
                        eroded[idx + 2] = 0;
                        eroded[idx + 3] = 255;
                    } else {
                        eroded[idx] = 255;
                        eroded[idx + 1] = 255;
                        eroded[idx + 2] = 255;
                        eroded[idx + 3] = 255;
                    }
                }
            }

            var newImageData = new ImageData(eroded, width, height);
            ctx.putImageData(newImageData, 0, 0);
        }

        // ============================================================
        //  反转颜色
        // ============================================================
        function invertColors(ctx, width, height) {
            var imageData = ctx.getImageData(0, 0, width, height);
            var data = imageData.data;
            for (var i = 0; i < data.length; i += 4) {
                data[i] = 255 - data[i];
                data[i + 1] = 255 - data[i + 1];
                data[i + 2] = 255 - data[i + 2];
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // ============================================================
        //  核心解码入口
        // ============================================================
        function enhancedDecode(file) {
            if (scanInProgress) {
                showToast('正在解码中，请稍候...', 'info');
                return;
            }
            scanInProgress = true;
            cancelDecode = false;
            showToast('正在解码...', 'info', 2000);
            clearLog();
            log('开始解码: ' + file.name + ' (模式: ' + currentMode + ')');

            var reader = new FileReader();
            reader.onload = function(ev) {
                var img = new Image();
                img.onload = function() {
                    if (cancelDecode) {
                        scanInProgress = false;
                        log('解码被取消');
                        return;
                    }
                    if (currentMode === 'quick') {
                        tryDecodeQuick(img, file.name);
                    } else if (currentMode === 'exhaustive') {
                        tryDecodeExhaustive(img, file.name);
                    } else if (currentMode === 'custom') {
                        tryDecodeCustom(img, file.name);
                    }
                };
                img.onerror = function() {
                    scanInProgress = false;
                    showResult('图片加载失败，请重试', false);
                    showToast('图片加载失败', 'error', 3000);
                    log('图片加载失败');
                };
                img.src = ev.target.result;
            };
            reader.onerror = function() {
                scanInProgress = false;
                showResult('读取文件失败', false);
                showToast('读取文件失败', 'error', 3000);
                log('读取文件失败');
            };
            reader.readAsDataURL(file);
        }

        // ============================================================
        //  快速模式
        // ============================================================
        function tryDecodeQuick(img, fileName) {
            var channels = ['gray', 'red', 'green', 'blue'];
            var channelNames = {
                gray: '灰度',
                red: '红色通道',
                green: '绿色通道',
                blue: '蓝色通道'
            };

            var strategies = [];
            channels.forEach(function(ch) {
                strategies.push({
                    name: '自适应阈值（' + channelNames[ch] + '）',
                    threshold: true,
                    channel: ch,
                    invert: false,
                    morph: false
                });
                strategies.push({
                    name: '自适应阈值（' + channelNames[ch] + '）+ 反色',
                    threshold: true,
                    channel: ch,
                    invert: true,
                    morph: false
                });
                strategies.push({
                    name: '自适应阈值（' + channelNames[ch] + '）+ 形态学',
                    threshold: true,
                    channel: ch,
                    invert: false,
                    morph: true
                });
                strategies.push({
                    name: '自适应阈值（' + channelNames[ch] + '）+ 反色 + 形态学',
                    threshold: true,
                    channel: ch,
                    invert: true,
                    morph: true
                });
            });

            strategies = strategies.concat([
                { name: '原始（反转）', useReverse: true, grayscale: false, contrast: false },
                { name: '原始（不反转）', useReverse: false, grayscale: false, contrast: false },
                { name: '灰度化', useReverse: false, grayscale: true, contrast: false },
                { name: '灰度+对比度增强', useReverse: false, grayscale: true, contrast: true },
                { name: '灰度+反转', useReverse: true, grayscale: true, contrast: false },
                { name: '灰度+对比度+反转', useReverse: true, grayscale: true, contrast: true }
            ]);

            var currentIndex = 0;
            var total = strategies.length;

            function tryNext() {
                if (cancelDecode) {
                    scanInProgress = false;
                    log('解码被取消（快速模式）');
                    return;
                }
                if (currentIndex >= total) {
                    scanInProgress = false;
                    showResult('所有策略失败', false);
                    showToast('识别失败，请尝试更清晰的图片', 'error', 4000);
                    log('所有策略失败');
                    return;
                }

                var strategy = strategies[currentIndex];
                currentIndex++;
                log('尝试策略: ' + strategy.name);

                var canvas = document.createElement('canvas');
                var ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                if (strategy.threshold) {
                    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    var data = imageData.data;
                    var channel = strategy.channel;

                    var sum = 0,
                        count = 0;
                    for (var i = 0; i < data.length; i += 4) {
                        var val;
                        if (channel === 'gray') {
                            var r = data[i],
                                g = data[i + 1],
                                b = data[i + 2];
                            val = 0.299 * r + 0.587 * g + 0.114 * b;
                        } else if (channel === 'red') val = data[i];
                        else if (channel === 'green') val = data[i + 1];
                        else if (channel === 'blue') val = data[i + 2];
                        sum += val;
                        count++;
                    }
                    var avgThreshold = sum / count;
                    log('  计算阈值: ' + avgThreshold.toFixed(0));

                    for (var j = 0; j < data.length; j += 4) {
                        var pixelVal;
                        if (channel === 'gray') {
                            var r = data[j],
                                g = data[j + 1],
                                b = data[j + 2];
                            pixelVal = 0.299 * r + 0.587 * g + 0.114 * b;
                        } else if (channel === 'red') pixelVal = data[j];
                        else if (channel === 'green') pixelVal = data[j + 1];
                        else if (channel === 'blue') pixelVal = data[j + 2];
                        var binary = pixelVal > avgThreshold ? 255 : 0;
                        data[j] = binary;
                        data[j + 1] = binary;
                        data[j + 2] = binary;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    log('  已二值化（自适应阈值）');

                    if (strategy.invert) {
                        invertColors(ctx, canvas.width, canvas.height);
                        log('  已反色');
                    }
                    if (strategy.morph) {
                        morphologicalClose(ctx, canvas.width, canvas.height);
                        log('  已执行形态学闭运算');
                    }

                    decodeCanvas(canvas)
                        .then(function(decodedText) {
                            if (cancelDecode) {
                                scanInProgress = false;
                                log('解码被取消（快速模式-成功前）');
                                return;
                            }
                            scanInProgress = false;
                            showResult(decodedText, true);
                            showToast('解码成功！ (策略: ' + strategy.name + ')', 'success', 2000);
                            log('解码成功! 策略: ' + strategy.name + ', 内容: ' + decodedText);
                        })
                        .catch(function(err) {
                            if (cancelDecode) {
                                scanInProgress = false;
                                log('解码被取消（快速模式-失败后）');
                                return;
                            }
                            log('  策略 [' + strategy.name + '] 失败: ' + err.message);
                            tryNext();
                        });
                    return;
                }

                // 传统策略
                if (strategy.grayscale) {
                    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    var data = imageData.data;
                    for (var i = 0; i < data.length; i += 4) {
                        var r = data[i],
                            g = data[i + 1],
                            b = data[i + 2];
                        var gray = 0.299 * r + 0.587 * g + 0.114 * b;
                        data[i] = gray;
                        data[i + 1] = gray;
                        data[i + 2] = gray;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    log('  已灰度化');
                }

                if (strategy.contrast) {
                    var grayData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    var gd = grayData.data;
                    var min = 255,
                        max = 0;
                    for (var j = 0; j < gd.length; j += 4) {
                        var val = gd[j];
                        if (val < min) min = val;
                        if (val > max) max = val;
                    }
                    var range = max - min;
                    if (range > 0) {
                        for (var k = 0; k < gd.length; k += 4) {
                            var v = gd[k];
                            v = ((v - min) / range) * 255;
                            gd[k] = v;
                            gd[k + 1] = v;
                            gd[k + 2] = v;
                        }
                        ctx.putImageData(gd, 0, 0);
                        log('  已对比度增强');
                    }
                }

                if (strategy.useReverse) {
                    var revData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    var rd = revData.data;
                    for (var m = 0; m < rd.length; m += 4) {
                        rd[m] = 255 - rd[m];
                        rd[m + 1] = 255 - rd[m + 1];
                        rd[m + 2] = 255 - rd[m + 2];
                    }
                    ctx.putImageData(revData, 0, 0);
                    log('  已反转颜色');
                }

                decodeCanvas(canvas)
                    .then(function(decodedText) {
                        if (cancelDecode) {
                            scanInProgress = false;
                            log('解码被取消（快速模式-传统成功前）');
                            return;
                        }
                        scanInProgress = false;
                        showResult(decodedText, true);
                        showToast('解码成功！ (策略: ' + strategy.name + ')', 'success', 2000);
                        log('解码成功! 策略: ' + strategy.name + ', 内容: ' + decodedText);
                    })
                    .catch(function(err) {
                        if (cancelDecode) {
                            scanInProgress = false;
                            log('解码被取消（快速模式-传统失败后）');
                            return;
                        }
                        log('  策略 [' + strategy.name + '] 失败: ' + err.message);
                        tryNext();
                    });
            }

            tryNext();
        }

        // ============================================================
        //  穷举模式（步长1，所有阈值0-255，含反色功能）
        // ============================================================
        function tryDecodeExhaustive(img, fileName) {
            var channels = ['gray', 'red', 'green', 'blue'];
            var channelNames = {
                gray: '灰度',
                red: '红色通道',
                green: '绿色通道',
                blue: '蓝色通道'
            };

            var totalAttempts = channels.length * 256 * 2; // 每个阈值尝试直接和反色两种
            var attempt = 0;

            showToast('穷举模式启动，将尝试 ' + totalAttempts + ' 种组合（含反色），时间可能较长', 'info', 4000);
            log('穷举模式开始，总尝试次数: ' + totalAttempts);

            function tryNextChannel(channelIndex) {
                if (cancelDecode) {
                    scanInProgress = false;
                    log('穷举模式被取消');
                    return;
                }
                if (channelIndex >= channels.length) {
                    scanInProgress = false;
                    showResult('穷举所有阈值（含反色）均未检测到二维码', false);
                    showToast('穷举失败，请尝试更清晰的图片', 'error', 4000);
                    log('穷举模式失败，所有通道和阈值均无效');
                    return;
                }

                var ch = channels[channelIndex];
                var chName = channelNames[ch];
                log('开始尝试通道: ' + chName);

                function tryThreshold(th) {
                    if (cancelDecode) {
                        scanInProgress = false;
                        log('穷举模式被取消（阈值循环中）');
                        return;
                    }
                    if (th > 255) {
                        log('通道 ' + chName + ' 所有阈值尝试完毕');
                        tryNextChannel(channelIndex + 1);
                        return;
                    }

                    // 第一次：直接二值化
                    attempt++;
                    if (attempt % 20 === 0) {
                        showToast('穷举中... ' + attempt + '/' + totalAttempts, 'info', 1000);
                    }

                    var canvas1 = document.createElement('canvas');
                    var ctx1 = canvas1.getContext('2d');
                    canvas1.width = img.width;
                    canvas1.height = img.height;
                    ctx1.drawImage(img, 0, 0);

                    var imageData1 = ctx1.getImageData(0, 0, canvas1.width, canvas1.height);
                    var data1 = imageData1.data;
                    var channel = ch;

                    for (var i = 0; i < data1.length; i += 4) {
                        var pixelVal;
                        if (channel === 'gray') {
                            var r = data1[i],
                                g = data1[i + 1],
                                b = data1[i + 2];
                            pixelVal = 0.299 * r + 0.587 * g + 0.114 * b;
                        } else if (channel === 'red') pixelVal = data1[i];
                        else if (channel === 'green') pixelVal = data1[i + 1];
                        else if (channel === 'blue') pixelVal = data1[i + 2];
                        var binary = pixelVal > th ? 255 : 0;
                        data1[i] = binary;
                        data1[i + 1] = binary;
                        data1[i + 2] = binary;
                    }
                    ctx1.putImageData(imageData1, 0, 0);

                    // 尝试直接解码
                    decodeCanvas(canvas1)
                        .then(function(decodedText) {
                            if (cancelDecode) {
                                scanInProgress = false;
                                log('穷举成功但被取消');
                                return;
                            }
                            scanInProgress = false;
                            showResult(decodedText, true);
                            showToast('穷举成功！通道: ' + chName + ', 阈值: ' + th + ' (直接)', 'success', 3000);
                            log('穷举成功! 通道: ' + chName + ', 阈值: ' + th + ' (直接), 内容: ' + decodedText);
                        })
                        .catch(function(err) {
                            if (cancelDecode) {
                                scanInProgress = false;
                                log('穷举被取消（直接解码失败后）');
                                return;
                            }
                            // 直接解码失败，尝试反色
                            attempt++;
                            if (attempt % 20 === 0) {
                                showToast('穷举中... ' + attempt + '/' + totalAttempts, 'info', 1000);
                            }

                            // 复制一份原图，二值化并反色
                            var canvas2 = document.createElement('canvas');
                            var ctx2 = canvas2.getContext('2d');
                            canvas2.width = img.width;
                            canvas2.height = img.height;
                            ctx2.drawImage(img, 0, 0);

                            var imageData2 = ctx2.getImageData(0, 0, canvas2.width, canvas2.height);
                            var data2 = imageData2.data;

                            for (var j = 0; j < data2.length; j += 4) {
                                var pixelVal2;
                                if (channel === 'gray') {
                                    var r = data2[j],
                                        g = data2[j + 1],
                                        b = data2[j + 2];
                                    pixelVal2 = 0.299 * r + 0.587 * g + 0.114 * b;
                                } else if (channel === 'red') pixelVal2 = data2[j];
                                else if (channel === 'green') pixelVal2 = data2[j + 1];
                                else if (channel === 'blue') pixelVal2 = data2[j + 2];
                                var binary2 = pixelVal2 > th ? 255 : 0;
                                data2[j] = binary2;
                                data2[j + 1] = binary2;
                                data2[j + 2] = binary2;
                            }
                            ctx2.putImageData(imageData2, 0, 0);
                            // 反色
                            invertColors(ctx2, canvas2.width, canvas2.height);

                            decodeCanvas(canvas2)
                                .then(function(decodedText2) {
                                    if (cancelDecode) {
                                        scanInProgress = false;
                                        log('穷举成功但被取消（反色）');
                                        return;
                                    }
                                    scanInProgress = false;
                                    showResult(decodedText2, true);
                                    showToast('穷举成功！通道: ' + chName + ', 阈值: ' + th + ' (反色)', 'success', 3000);
                                    log('穷举成功! 通道: ' + chName + ', 阈值: ' + th + ' (反色), 内容: ' + decodedText2);
                                })
                                .catch(function(err2) {
                                    if (cancelDecode) {
                                        scanInProgress = false;
                                        log('穷举被取消（反色解码失败后）');
                                        return;
                                    }
                                    // 两种方式都失败，继续下一个阈值
                                    tryThreshold(th + 1);
                                });
                        });
                }

                tryThreshold(0);
            }

            tryNextChannel(0);
        }

        // ============================================================
        //  自定义模式
        // ============================================================
        function tryDecodeCustom(img, fileName) {
            // 读取用户设置
            var channel = channelSelect.value;
            var threshold = parseInt(thresholdInput.value);
            var invert = invertCheck.checked;
            var morph = morphCheck.checked;

            if (isNaN(threshold) || threshold < 0 || threshold > 255) {
                showToast('请输入0-255之间的阈值', 'error', 3000);
                scanInProgress = false;
                return;
            }

            var channelName = {
                gray: '灰度',
                red: '红色',
                green: '绿色',
                blue: '蓝色'
            } [channel];

            log('自定义模式 - 通道: ' + channelName + ', 阈值: ' + threshold + ', 反色: ' + invert + ', 形态学: ' + morph);

            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var data = imageData.data;

            // 二值化
            for (var i = 0; i < data.length; i += 4) {
                var pixelVal;
                if (channel === 'gray') {
                    var r = data[i],
                        g = data[i + 1],
                        b = data[i + 2];
                    pixelVal = 0.299 * r + 0.587 * g + 0.114 * b;
                } else if (channel === 'red') pixelVal = data[i];
                else if (channel === 'green') pixelVal = data[i + 1];
                else if (channel === 'blue') pixelVal = data[i + 2];
                var binary = pixelVal > threshold ? 255 : 0;
                data[i] = binary;
                data[i + 1] = binary;
                data[i + 2] = binary;
            }
            ctx.putImageData(imageData, 0, 0);
            log('  已二值化（阈值: ' + threshold + '）');

            if (invert) {
                invertColors(ctx, canvas.width, canvas.height);
                log('  已反色');
            }
            if (morph) {
                morphologicalClose(ctx, canvas.width, canvas.height);
                log('  已执行形态学闭运算');
            }

            decodeCanvas(canvas)
                .then(function(decodedText) {
                    if (cancelDecode) {
                        scanInProgress = false;
                        log('自定义模式被取消');
                        return;
                    }
                    scanInProgress = false;
                    showResult(decodedText, true);
                    showToast('自定义模式解码成功！', 'success', 2000);
                    log('自定义模式解码成功! 内容: ' + decodedText);
                })
                .catch(function(err) {
                    if (cancelDecode) {
                        scanInProgress = false;
                        log('自定义模式被取消');
                        return;
                    }
                    scanInProgress = false;
                    showResult('自定义模式解码失败: ' + err.message, false);
                    showToast('自定义模式解码失败，请调整参数', 'error', 3000);
                    log('自定义模式失败: ' + err.message);
                });
        }

        // ============================================================
        //  初始化
        // ============================================================
        function init() {
            updateUI();
            clearResult();
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') clearResult();
            });
            // 默认快速模式
            doSetMode('quick');
            log('二维码读取器已加载');
            debugLog.classList.add('show');
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            init();
        } else {
            document.addEventListener('DOMContentLoaded', init);
        }
    </script>
